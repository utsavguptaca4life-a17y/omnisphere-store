<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnistore | Inventory Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0c; color: #e2e8f0; }
        .omni-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .pulse-online { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 omni-gradient border-r border-white/10 p-6 flex flex-col">
        <div class="mb-10 text-2xl font-bold tracking-tighter text-blue-400">OMNISTORE</div>
        <nav class="space-y-4 flex-1">
            <a href="#" class="block p-3 rounded-xl bg-blue-600/10 text-blue-400 border border-blue-500/20">Dashboard</a>
            <a href="#" class="block p-3 rounded-xl hover:bg-white/5 transition">Inventory</a>
            <a href="#" class="block p-3 rounded-xl hover:bg-white/5 transition">Analytics</a>
        </nav>
        <div class="mt-auto glass-panel p-4 rounded-xl text-xs text-slate-500 text-center">
            System v2.4.0 <span class="text-green-500 ml-1">● Live</span>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header class="flex justify-between items-center mb-12">
            <h2 class="text-2xl font-semibold">Inventory Overview</h2>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs text-slate-500">Last Sync</p>
                    <p class="text-sm font-mono text-blue-400">Just Now</p>
                </div>
                <div class="h-2 w-2 rounded-full bg-green-500 pulse-online"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass-panel p-6 rounded-2xl group hover:border-blue-500/50 transition-all duration-300">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="text-lg font-bold">Wireless Headphones X1</h3>
                        <p class="text-sm text-slate-400">SKU: OMNI-7721</p>
                    </div>
                    <span class="px-3 py-1 rounded-lg bg-blue-500/10 text-blue-400 text-xs font-bold border border-blue-500/20">ELECTRONICS</span>
                </div>
                
                <div class="flex items-end justify-between">
                    <div>
                        <p class="text-3xl font-bold">142 <span class="text-sm text-slate-500 font-normal">units</span></p>
                        <p class="text-green-400 text-xs mt-1">↑ 12% from last week</p>
                    </div>
                    <button class="bg-white text-black px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-400 transition">Manage</button>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-2xl border-orange-500/20">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="text-lg font-bold">Smart Watch Series 9</h3>
                        <p class="text-sm text-slate-400">SKU: OMNI-9902</p>
                    </div>
                    <span class="px-3 py-1 rounded-lg bg-orange-500/10 text-orange-400 text-xs font-bold border border-orange-500/20">LOW STOCK</span>
                </div>
                
                <div class="flex items-end justify-between">
                    <div>
                        <p class="text-3xl font-bold text-orange-500">08 <span class="text-sm text-slate-500 font-normal">units</span></p>
                        <div class="w-32 h-1.5 bg-white/5 rounded-full mt-3 overflow-hidden">
                            <div class="bg-orange-500 h-full w-[15%]"></div>
                        </div>
                    </div>
                    <button class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-bold">Restock</button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
